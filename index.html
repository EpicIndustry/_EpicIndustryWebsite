<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Epic Industry</title>
    <meta name="author" content="Epic Industry">
    <meta name="description" content="Our digital footprint, much like our approach, is intentional and exclusive. We do not seek or entertain inbound engagements.">
    <meta property="og:url" content="https://epicindustry.com/">
    <meta property="og:site_name" content="Epic Industry">
    <meta property="og:title" content="Epic Industry">
    <meta property="og:description" content="Our digital footprint, much like our approach, is intentional and exclusive. We do not seek or entertain inbound engagements.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logo.jpg">
    <meta property="og:locale" content="en_US">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Epic Industry">
    <meta name="twitter:description" content="Our digital footprint, much like our approach, is intentional and exclusive. We do not seek or entertain inbound engagements.">
    <meta name="twitter:image" content="logo.jpg">
    <meta name="twitter:image:alt" content="Epic Industry">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lusitana:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: 'Lusitana', Georgia, serif;
            font-size: 16px;
            color: #1b1b1b;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }

        .page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header / Nav */
        .header {
            width: 100%;
            padding: 8px;
        }

        .logo-container {
            text-align: center;
        }

        .logo-container a {
            display: inline-block;
            text-decoration: none;
        }

        .logo-container img {
            height: 75px;
            max-width: 100%;
            width: auto;
            vertical-align: middle;
            object-fit: contain;
        }

        /* Hero content */
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .hero-inner {
            text-align: center;
            max-width: 750px;
            width: 100%;
        }

        .tagline {
            font-family: 'Lato', arial, sans-serif;
            font-size: 22px;
            font-weight: 400;
            color: #1b1b1b;
            line-height: 1.5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tagline a {
            color: #8a7400;
            font-weight: inherit;
            text-decoration: none;
            cursor: pointer;
            border: 0;
        }

        .tagline a:hover {
            color: #544600;
        }

        .tagline a:active {
            color: #3a3000;
        }

        /* Divider / Footer */
        .divider-section {
            padding: 32px 0;
        }

        .divider-container {
            max-width: 984px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .divider-container hr {
            border: 0;
            border-bottom: 1px solid #e2e2e2;
            width: 100%;
            margin: 0;
        }

        /* Responsive */
        @media (min-width: 768px) {
            .tagline { font-size: 22px; }
        }

        @media (min-width: 1024px) {
            .hero { min-height: 85vh; }
            .tagline { font-size: 22px; }
            .hero-inner { width: 75%; padding: 0 32px; }
            .divider-container { max-width: 984px; }
        }

        @media (min-width: 1280px) {
            .divider-container { max-width: 1160px; }
        }

        @media (min-width: 1536px) {
            .tagline { font-size: 24px; }
            .divider-container { max-width: 1280px; }
        }

        @media (max-width: 767px) {
            .logo-container img {
                height: 75px;
                max-width: 224px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="logo-container">
                <a href="/">
                    <img src="logo.jpg" alt="Epic Industry">
                </a>
            </div>
        </header>

        <main class="hero">
            <div class="hero-inner">
                <div class="tagline">
                    <p>Our digital footprint, much like our approach, is intentional and exclusive.</p>
                    <p><br></p>
                    <p>We do not seek or entertain inbound engagements.</p>
                </div>
            </div>
        </main>

        <footer class="divider-section">
            <div class="divider-container">
                <hr aria-hidden="true" role="separator">
            </div>
        </footer>
    </div>
</body>
</html>
